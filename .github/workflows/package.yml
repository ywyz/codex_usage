name: package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m pytest tests evals -q

      - name: Build Linux package
        if: runner.os == 'Linux'
        run: bash scripts/build_linux.sh

      - name: Build Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: codex-usage-widget-linux
          path: release/linux/*.tar.gz

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: codex-usage-widget-windows
          path: release/windows/*.zip
